<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Application Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="container text-center" style="max-width: 550px;">
        <div class="card shadow border-0 p-4">
            <div class="card-body">
                <div class="text-danger display-1 mb-3">⚠️</div>
                <h2 class="text-secondary mb-3">Something Went Wrong</h2>
                <p class="text-muted mb-4" th:text="${errorMessage}">An unexpected systemic error occurred on our end.</p>
                <hr>
                <div class="d-flex justify-content-center gap-3 mt-3">
                    <a href="/login" class="btn btn-primary shadow-sm">Go to Login</a>
                    <button onclick="window.history.back()" class="btn btn-outline-secondary">Go Back</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
