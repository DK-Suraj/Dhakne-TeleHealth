<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeleHealth - Establish New Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
<div class="card shadow border-0 p-4 rounded-4" style="width: 100%; max-width: 440px; background-color:#fff;">
    <h4 class="fw-bold text-dark text-center mb-1">Establish New Password</h4>
    <p class="text-muted small text-center mb-4">Input the unique 6-digit security validation OTP dispatched onto your email index.</p>
    
    <div th:if="${error}" class="alert alert-danger border-0 small fw-semibold text-center mb-3" th:text="${error}"></div>

    <form th:action="@{/reset-password}" method="post">
        <input type="hidden" name="email" th:value="${targetEmail}" />
        
        <div class="mb-3">
            <label class="form-label small fw-bold text-secondary d-block text-center mb-2">6-Digit Reset OTP</label>
            <input type="text" name="resetOtp" class="form-control text-center py-2 fw-bold" style="font-size: 22px; letter-spacing: 4px;" maxlength="6" pattern="\d{6}" placeholder="000000" inputmode="numeric" required autocomplete="off"/>
        </div>
        
        <div class="mb-4">
            <label class="form-label small fw-bold text-secondary">New Secure Password</label>
            <input type="password" name="newPassword" class="form-control py-2" placeholder="••••••••" minlength="6" required />
        </div>
        
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-3 shadow-sm mb-2">Update Credentials</button>
    </form>
</div>
</body>
</html>
