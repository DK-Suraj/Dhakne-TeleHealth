<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dhakne Hospital | Create Account</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            /* Using a beautiful clinical mesh gradient background to power the glass contrast */
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #1d4ed8 100%);
            color: #f8fafc;
            min-vh: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient background glow matching the index design asset */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        /* PREMIUM GLASSMORPHISM FORM WRAPPER */
        .glass-register-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
        }

        .brand-logo-link {
            font-weight: 800;
            letter-spacing: -0.5px;
            font-size: 1.4rem;
            color: #ffffff;
            text-decoration: none;
        }

        /* CUSTOM TRANSLUCENT INPUT FIELDS */
        .form-control-glass, .form-select-glass {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #ffffff !important;
            border-radius: 12px !important;
            padding: 11px 16px !important;
            transition: all 0.3s ease !important;
        }
        .form-control-glass::placeholder {
            color: rgba(255, 255, 255, 0.4) !important;
        }
        .form-control-glass:focus, .form-select-glass:focus {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.3) !important;
        }

        /* TARGET OVERRIDE FOR OPTIONS WITHIN SELECT DROP DOWNS */
        .form-select-glass option {
            background-color: #1e293b !important;
            color: #ffffff !important;
        }

        /* HIGH IMPACT ACTION BUTTON */
        .btn-action-submit {
            background: #2563eb;
            color: #ffffff;
            border-radius: 12px;
            padding: 12px 20px;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-action-submit:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .text-glass-muted {
            color: #cbd5e1;
        }
        .link-highlight-blue {
            color: #38bdf8;
            font-weight: 500;
        }
        .link-highlight-blue:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-10 col-sm-8 col-md-6 col-lg-5">
            
            <div class="card glass-register-card p-4 p-sm-5 my-3">
                <div class="text-center mb-4">
                    <a href="/" class="brand-logo-link mb-2 d-inline-flex align-items-center gap-2">
                        <i class="bi bi-shield-plus text-primary"></i> Dhakne Hospital
                    </a>
                    <p class="text-glass-muted small mb-0">Create your digital portal account logs</p>
                </div>

                <div th:if="${error}" class="alert alert-danger bg-danger bg-opacity-20 border-danger border-opacity-30 text-white small rounded-3 p-3 mb-4" th:text="${error}"></div>

                <form th:action="@{/register}" th:object="${user}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label text-glass-muted small fw-semibold">Full Name</label>
                        <input type="text" th:field="*{fullName}" class="form-control form-control-glass" placeholder="John Doe" required autocomplete="off"/>
                        <div class="text-warning small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-glass-muted small fw-semibold">Email Address</label>
                        <input type="email" th:field="*{email}" class="form-control form-control-glass" placeholder="name@example.com" required autocomplete="off"/>
                        <div class="text-warning small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-glass-muted small fw-semibold">Password</label>
                        <input type="password" th:field="*{password}" class="form-control form-control-glass" placeholder="Minimum 6 characters" required/>
                        <div class="text-warning small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-glass-muted small fw-semibold">Phone Number</label>
                        <input type="text" th:field="*{phoneNumber}" class="form-control form-control-glass" placeholder="9876543210" required autocomplete="off"/>
                        <div class="text-warning small mt-1" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-glass-muted small fw-semibold">Register As</label>
                        <select th:field="*{role}" class="form-select form-select-glass" required>
                            <option value="ROLE_PATIENT">Patient (Book Appointments)</option>
                            <option value="ROLE_DOCTOR">Medical Consultant (Doctor Console)</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-action-submit w-100 py-2.5 shadow">Create Account</button>
                </form>

                <p class="text-center text-glass-muted mt-4 mb-0 small">
                    Already have an account? <a href="/login" class="link-highlight-blue text-decoration-none ms-1">Sign In here</a>
                </p>
            </div>
            
        </div>
    </div>
</div>

<script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
