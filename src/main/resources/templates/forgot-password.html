<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>TeleHealth - Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
<div class="card shadow border-0 p-4 rounded-4" style="width: 100%; max-width: 440px; background-color:#fff;">
    <h4 class="fw-bold text-dark text-center mb-1">Forgot Password?</h4>
    <p class="text-muted small text-center mb-4">Provide your profile email to trigger a 6-digit secure access token OTP configuration routine.</p>
    
    <div th:if="${error}" class="alert alert-danger border-0 small fw-semibold text-center mb-3" th:text="${error}"></div>

    <form th:action="@{/forgot-password}" method="post">
        <div class="mb-4">
            <label class="form-label small fw-bold text-secondary">Account Email Address</label>
            <input type="email" name="email" class="form-control py-2" placeholder="name@example.com" required autocomplete="off"/>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-3 shadow-sm mb-2">Send Reset OTP</button>
        <div class="text-center"><a href="/login" class="text-decoration-none small fw-bold text-secondary">Return to Login</a></div>
    </form>
</div>
</body>
</html>
